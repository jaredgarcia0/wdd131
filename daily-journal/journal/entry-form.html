<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Entry — Daily Journal</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAV -->
    <nav>
        <span class="nav-logo">📓 Daily Journal</span>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="entries.html">Journal Entries</a>
            <a href="entry-form.html">Calendar</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">

            <h2 id="form-title">New Entry</h2>

            <div class="form-group">
                <label for="entry-title">Title</label>
                <input
                    type="text"
                    id="entry-title"
                    placeholder="Give your entry a title..."
                />
            </div>

            <div class="form-group">
                <label for="entry-body">What's on your mind?</label>
                <textarea
                    id="entry-body"
                    placeholder="Write your thoughts here..."
                ></textarea>
            </div>

            <div class="form-group">
                <label for="entry-tags">Tags</label>
                <input
                    type="text"
                    id="entry-tags"
                    placeholder="e.g. happy, work, gratitude"
                />
                <p class="form-hint">Separate tags with commas</p>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" id="save-btn">Save Entry</button>
                <a href="entries.html" class="btn btn-outline">Cancel</a>
                <button
                    class="btn btn-outline"
                    id="delete-btn"
                    style="display:none; color:#e05555; border-color:#e05555; margin-left:auto;"
                >Delete Entry</button>
            </div>

    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
