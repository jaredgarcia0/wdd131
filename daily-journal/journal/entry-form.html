<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Write a new journal entry or edit an existing one.">
  <title>New Entry — Daily Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav aria-label="Main navigation">
    <span class="nav-logo">📓 Daily Journal</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="entries.html">Journal Entries</a>
      <a href="entry-form.html" class="active" aria-current="page">New Entry</a>
    </div>
  </nav>

  <main class="container">
    <div class="form-card">

      <h2 id="form-title">New Entry</h2>

      <div class="form-group">
        <label for="entry-title">Title</label>
        <input
          type="text"
          id="entry-title"
          placeholder="Give your entry a title..."
        />
      </div>

      <div class="form-group">
        <label for="entry-body">What's on your mind?</label>
        <textarea
          id="entry-body"
          placeholder="Write your thoughts here..."
        ></textarea>
      </div>

      <div class="form-group">
        <label for="entry-tags">Tags</label>
        <input
          type="text"
          id="entry-tags"
          placeholder="e.g. happy, work, gratitude"
        />
        <p class="form-hint">Separate tags with commas</p>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="save-btn">Save Entry</button>
        <a href="entries.html" class="btn btn-outline">Cancel</a>
        <button
          class="btn btn-outline"
          id="delete-btn"
          style="display:none; color:#e05555; border-color:#e05555; margin-left:auto;"
        >Delete Entry</button>
      </div>

    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/form.js"></script>
</body>
</html>
