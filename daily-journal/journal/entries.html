<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <span class="nav-logo">📓 Daily Journal</span>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="entries.html">Journal Entries</a>
            <a href="entry-form.html">Calendar</a>
        </div>
    </nav>

    <div class="container">

        <div class="section-header">
            <h2>All Entries</h2>
            <a style="color: #ffffff;" href="entry-form.html" class="btn btn-primary">New Entry</a>
        </div>

        <!-- Search and filters -->
        <div class="filters-bar">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search entries..."
                />
            </div>

            <div class="filter-controls">
                <select id="sort-select">
                    <option value="newest">Newest first</option>
                    <option value="oldest">Oldest first</option>
                </select>

            <select id="tag-select">
                <option value="">All tags</option>
                <!-- Filled by entries.js -->
                </select>
            </div>
        </div>

        <!-- RESULTS COUNT -->
        <p id="results-count" class="results-count"></p>

        <!-- ENTRIES LIST -->
        <div id="entries-list">
        <!-- Filled by entries.js -->
        </div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/entries.js"></script>
</body>
</html>
