<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse, search and filter all your Daily Journal entries.">
  <title>Journal Entries — Daily Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav aria-label="Main navigation">
    <span class="nav-logo">📓 Daily Journal</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="entries.html" class="active" aria-current="page">Journal Entries</a>
      <a href="entry-form.html">New Entry</a>
    </div>
  </nav>

  <main class="container">

    <div class="section-header">
      <h2>All Entries</h2>
      <a style="color: #ffff;" href="entry-form.html" class="btn btn-primary">+ New Entry</a>
    </div>

    <div class="filters-bar">
      <div class="search-bar">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <label for="search-input" class="sr-only">Search entries</label>
        <input
          type="text"
          id="search-input"
          placeholder="Search entries..."
        />
      </div>

      <div class="filter-controls">
        <label for="sort-select" class="sr-only">Sort order</label>
        <select id="sort-select">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>

        <label for="tag-select" class="sr-only">Filter by tag</label>
        <select id="tag-select">
          <option value="">All tags</option>
          <!-- Filled by entries.js -->
        </select>
      </div>
    </div>

    <p id="results-count" class="results-count" aria-live="polite"></p>

    <div id="entries-list">
      <!-- Filled by entries.js -->
    </div>

  </main>

  <script src="js/data.js"></script>
  <script src="js/entries.js"></script>
</body>
</html>
